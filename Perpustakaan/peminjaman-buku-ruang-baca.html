<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peminjaman Buku Ruang Baca</title>

<style>

/* reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* body fullscreen */

body{
background:#111;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:auto;
font-family:Arial, sans-serif;
}

/* tombol kembali */

.back-button{
position:fixed;
top:20px;
left:20px;
background:rgba(255,255,255,0.9);
color:#333;
padding:8px 16px;
border-radius:25px;
text-decoration:none;
font-size:14px;
font-weight:500;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:all 0.2s ease;
}

.back-button:hover{
background:white;
transform:scale(1.05);
}

/* viewer */

.viewer{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* gambar */

.viewer img{
max-width:100%;
height:auto;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
border-radius:8px;
}

/* HP */

@media (max-width:768px){

.viewer{
padding:10px;
}

.viewer img{
width:100%;
}

.back-button{
top:15px;
left:15px;
font-size:13px;
padding:7px 14px;
}

}

</style>

</head>

<body>

<a href="Perpustakaan/sop-perpustakaan.html" class="back-button">← Kembali</a>

<div class="viewer">

<img src="Perpustakaan/peminjaman-buku-ruang-baca.png" 
alt="Flowchart Peminjaman Buku Ruang Baca">

</div>

</body>
</html>
