<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Perpustakaan - Universitas Jember</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<a href="index.html" class="back-button">← Dashboard</a>

<div class="logo-area">
<img src="logo.png" alt="Logo Universitas Jember">
<h1>SOP PERPUSTAKAAN B</h1>
<p>UNIVERSITAS JEMBER</p>
</div>

<div class="menu-grid">

<a href="#" class="menu-box"
data-image="Perpustakaan/peminjaman-buku-ruang-baca.png"
onclick="openFlowchart(this)">
Peminjaman Buku Ruang Baca
</a>

<a href="#" class="menu-box"
data-image="Perpustakaan/pengembalian-buku-ruang-baca.png"
onclick="openFlowchart(this)">
Pengembalian Buku Ruang Baca
</a>

</div>

</div>

<!-- FLOWCHART VIEWER -->

<div id="flowchartViewer" class="flowchart-modal">

<span class="close-flowchart" onclick="closeFlowchart()">✕</span>

<img id="flowchartImage" src="" alt="Flowchart SOP">

</div>

<script>

function openFlowchart(element){

let image = element.getAttribute("data-image");

document.getElementById("flowchartImage").src = image;

document.getElementById("flowchartViewer").style.display="flex";

}

function closeFlowchart(){

document.getElementById("flowchartViewer").style.display="none";

}

</script>

</body>
</html>
